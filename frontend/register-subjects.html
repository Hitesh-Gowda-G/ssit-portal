<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Subjects | SSIT Portal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><img src="assets/logo.png" alt="Logo"><span>SSIT Portal</span></div>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
                <li class="nav-item"><a href="register-subjects.html" class="nav-link active"><i class="fas fa-book-medical"></i><span>Register Subjects</span></a></li>
                <li class="nav-item"><a href="my-subjects.html" class="nav-link"><i class="fas fa-book"></i><span>My Registered Subjects</span></a></li>
                <li class="nav-item"><a href="history.html" class="nav-link"><i class="fas fa-history"></i><span>History</span></a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link"><i class="fas fa-user-circle"></i><span>Profile</span></a></li>
            </ul>
            <div class="nav-item" style="margin-top: auto;">
                <a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
                <div class="page-title"><h2>Subject Catalog</h2></div>
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">JD</div>
                    <div class="user-info"><span id="userName">John Doe</span></div>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <div class="controls-grid" style="width: 100%;">
                        <select id="semesterSelect" class="form-input">
                            <option value="Spring 2026">Spring 2026</option>
                            <option value="Fall 2026">Fall 2026</option>
                        </select>
                        <select id="academicYearSelect" class="form-input">
                            <option value="2025-2026">2025-2026</option>
                            <option value="2026-2027">2026-2027</option>
                        </select>
                        <input type="text" id="searchInput" class="form-input" placeholder="Search by code or name...">
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="subjectsTable">
                        <thead>
                            <tr>
                                <th>Subject Code</th>
                                <th>Subject Name</th>
                                <th>Credits</th>
                                <th>Schedule</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="assets/js/api.js?v=2"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/subjects.js"></script>
</body>
</html>
