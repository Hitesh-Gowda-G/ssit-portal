<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SSIT Portal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="assets/logo.png" alt="Logo">
                <span>SSIT Portal</span>
            </div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link active">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="register-subjects.html" class="nav-link">
                        <i class="fas fa-book-medical"></i>
                        <span>Register Subjects</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="my-subjects.html" class="nav-link">
                        <i class="fas fa-book"></i>
                        <span>My Registered Subjects</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="history.html" class="nav-link">
                        <i class="fas fa-history"></i>
                        <span>History</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="profile.html" class="nav-link">
                        <i class="fas fa-user-circle"></i>
                        <span>Profile</span>
                    </a>
                </li>
            </ul>
            <div class="nav-item" style="margin-top: auto;">
                <a href="#" class="nav-link" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="hamburger" id="hamburger">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="page-title">
                    <h2 id="pageTitle">Student Dashboard</h2>
                </div>
                <div class="user-profile">
                    <div class="notifications">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="user-avatar" id="userAvatar">JD</div>
                    <div class="user-info">
                        <span id="userName">John Doe</span>
                    </div>
                </div>
            </header>

            <div id="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span>Total Subjects Registered</span>
                        <h2 id="totalSubjects">0</h2>
                    </div>
                    <div class="stat-card">
                        <span>Credits Registered</span>
                        <h2 id="totalCredits">0</h2>
                    </div>
                    <div class="stat-card">
                        <span>Academic Year</span>
                        <h2>2025-2026</h2>
                    </div>
                    <div class="stat-card">
                        <span>Semester</span>
                        <h2>Spring</h2>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Recent Activity</h3>
                    </div>
                    <div class="table-responsive">
                        <table id="recentActivityTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Subject</th>
                                    <th>Action</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="assets/js/api.js?v=2"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
