<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SSIT Portal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/logo.png" alt="UniPortal" style="width: 80px; margin-bottom: 1rem;">
                <h1>SSIT Portal</h1>
                <p>Create your student account</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="student@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="usn">USN</label>
                    <input type="text" id="usn" class="form-input" placeholder="1MS21CS001" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span>Register</span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="index.html">Login here</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="assets/js/api.js?v=2"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
